services:
  - type: web
    name: stocktick
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 app:app
    plan: free
    envVars:
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_VIRTUAL
        value: "0"
      - key: PYTHONUNBUFFERED
        value: "1"
