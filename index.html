<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockTick · 관심종목</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0f0d">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<link rel="icon" href="/static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockTick">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #101714;
    --surface-2: #151f1b;
    --border: #1d2b25;
    --border-soft: #182420;
    --mint: #34d399;
    --mint-dim: #1f8f68;
    --mint-glow: rgba(52, 211, 153, .16);
    --up: #ff5470;
    --up-dim: rgba(255, 84, 112, .14);
    --down: #4d9fff;
    --down-dim: rgba(77, 159, 255, .14);
    --amber: #f5b942;
    --text: #eef4f0;
    --text-dim: #7e938a;
    --text-faint: #4c5c54;
    --font-ui: 'PretendardVariable', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-num: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
  }
  body {
    background-image:
      radial-gradient(ellipse 800px 400px at 15% -10%, var(--mint-glow), transparent 60%);
    padding-bottom: 48px;
  }

  /* ---------- Header ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 22px 18px 14px;
    background: linear-gradient(180deg, var(--bg) 72%, transparent);
    backdrop-filter: blur(6px);
  }
  .brand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 9px;
  }
  .brand .mark {
    width: 9px; height: 9px; border-radius: 2px;
    background: var(--mint);
    box-shadow: 0 0 10px var(--mint-glow);
    transform: rotate(45deg);
    flex-shrink: 0;
  }
  .brand h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .brand .tagline {
    font-size: 11.5px;
    color: var(--text-faint);
    font-weight: 500;
  }

  .market-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 11px 6px 9px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .market-badge .dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }
  .market-badge.open { color: var(--mint); }
  .market-badge.open .dot { background: var(--mint); box-shadow: 0 0 8px var(--mint); animation: pulse 1.8s infinite; }
  .market-badge.closed { color: var(--text-dim); }
  .market-badge.closed .dot { background: var(--text-faint); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .closed-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    border-radius: 12px;
    background: linear-gradient(90deg, rgba(245,185,66,.10), transparent);
    border: 1px solid rgba(245,185,66,.22);
    font-size: 12.5px;
    color: #e8dcae;
  }
  .closed-banner.show { display: flex; }
  .closed-banner .ico { font-size: 15px; flex-shrink: 0; }
  .closed-banner b { color: var(--amber); font-weight: 700; }
  .closed-banner span.dim { color: var(--text-dim); }

  /* ---------- Search ---------- */
  .search-box { position: relative; }
  .search-box .icon {
    position: absolute;
    left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-faint);
    pointer-events: none;
  }
  .search-box input {
    width: 100%;
    padding: 13px 14px 13px 40px;
    border-radius: 13px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 14.5px;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .search-box input:focus { border-color: var(--mint-dim); background: var(--surface-2); }
  .search-box input::placeholder { color: var(--text-faint); }

  .search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 0; right: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 13px;
    overflow: hidden;
    z-index: 30;
    max-height: 280px;
    overflow-y: auto;
    display: none;
    box-shadow: 0 12px 32px rgba(0,0,0,.4);
  }
  .search-results.show { display: block; }
  .search-item {
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    border-bottom: 1px solid var(--border-soft);
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:active, .search-item:hover { background: rgba(255,255,255,.03); }
  .search-item .nm { font-size: 14px; font-weight: 500; }
  .search-item .right-meta { display: flex; align-items: center; gap: 10px; }
  .search-item .mk { font-size: 10.5px; color: var(--text-faint); font-family: var(--font-num); }
  .search-item .add-flag {
    font-size: 11px; font-weight: 600; color: var(--mint);
    white-space: nowrap;
  }
  .search-item.added { cursor: default; }
  .search-item.added .nm { color: var(--text-dim); }
  .search-item.added .add-flag { color: var(--text-faint); }

  main { padding: 4px 18px; }

  .empty {
    text-align: center;
    color: var(--text-faint);
    padding: 70px 20px 40px;
    font-size: 13.5px;
    line-height: 1.7;
  }
  .empty .big { font-size: 30px; margin-bottom: 10px; opacity: .5; }

  /* ---------- Card ---------- */
  .card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 14px 14px 14px 16px;
    margin-bottom: 9px;
    overflow: hidden;
    transition: background .15s, border-color .15s;
  }
  .card::before {
    content: "";
    position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
    border-radius: 3px;
    background: var(--text-faint);
    transition: background .25s;
  }
  .card.dir-up::before { background: var(--up); }
  .card.dir-down::before { background: var(--down); }

  .card.flash-up::after, .card.flash-down::after {
    content: "";
    position: absolute; inset: 0;
    opacity: 0;
    animation: flash .6s ease-out;
    animation-fill-mode: forwards;
    pointer-events: none;
  }
  .card.flash-up::after { background: var(--up); }
  .card.flash-down::after { background: var(--down); }
  @keyframes flash { from { opacity: .14; } to { opacity: 0; } }

  .card .left {
    display: flex; flex-direction: column; gap: 4px;
    min-width: 0;
    flex: 1 1 auto;
  }
  .card .name {
    font-size: 14.5px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card .code {
    font-size: 10.5px; color: var(--text-faint);
    font-family: var(--font-num);
    letter-spacing: .02em;
  }

  .spark-wrap {
    flex: 0 0 auto;
    width: 56px; height: 26px;
    display: flex; align-items: center; justify-content: center;
  }
  .spark-wrap svg { width: 100%; height: 100%; overflow: visible; }
  .spark-wrap .flat-hint { font-size: 9px; color: var(--text-faint); font-family: var(--font-num); }

  .right {
    text-align: right;
    display: flex; flex-direction: column; gap: 3px;
    flex: 0 0 auto;
    min-width: 92px;
  }
  .price {
    font-family: var(--font-num);
    font-size: 16.5px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.01em;
  }
  .change {
    font-family: var(--font-num);
    font-size: 11.5px; font-weight: 500;
    font-variant-numeric: tabular-nums;
    display: flex; align-items: center; justify-content: flex-end; gap: 3px;
  }
  .change .arrow { font-size: 9px; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--text-dim); }

  .remove-btn {
    flex: 0 0 auto;
    background: none; border: none; color: var(--text-faint);
    font-size: 17px; padding: 4px 0 4px 4px; cursor: pointer;
    line-height: 1;
    transition: color .15s;
  }
  .remove-btn:hover { color: var(--up); }

  .footer-note {
    text-align: center;
    color: var(--text-faint);
    font-size: 10.5px;
    margin-top: 22px;
    padding: 0 24px;
    line-height: 1.8;
  }
  .footer-note .sep { margin: 0 6px; opacity: .5; }
</style>
</head>
<body>

<header>
  <div class="brand-row">
    <div class="brand">
      <span class="mark"></span>
      <div>
        <h1>StockTick</h1>
        <div class="tagline">광고 없는 관심종목 시세</div>
      </div>
    </div>
    <div id="marketBadge" class="market-badge closed">
      <span class="dot"></span>
      <span id="marketBadgeText">확인 중</span>
    </div>
  </div>

  <div id="closedBanner" class="closed-banner">
    <span class="ico">🌙</span>
    <span><b>장 마감</b> · 09:00~15:30 거래시간에 실시간으로 갱신돼요.</span>
  </div>

  <div class="search-box">
    <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="searchInput" type="text" placeholder="종목명 또는 코드 검색 (예: 삼성전자)" autocomplete="off">
    <div id="searchResults" class="search-results"></div>
  </div>
</header>

<main>
  <div id="list"></div>
  <div id="emptyState" class="empty">
    <div class="big">◇</div>
    아직 등록된 종목이 없어요.<br>위 검색창에서 종목을 추가해보세요.
  </div>
</main>

<div class="footer-note">
  한국투자증권 실시간 체결가(웹소켓)<span class="sep">·</span>2초마다 화면 갱신<br>
  투자 참고용이며 매매 근거로 사용 시 책임지지 않습니다.
</div>

<script>
const STORAGE_KEY = "stocktick_watchlist";
let watchlist = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); // [{code,name,market}]
let lastPrices = {};       // code -> 마지막 가격 (플래시 애니메이션용)
let priceHistory = {};     // code -> [price, price, ...] (세션 동안 관찰된 값, 스파크라인용)
const MAX_HISTORY = 30;
let pollTimer = null;

const listEl = document.getElementById("list");
const emptyEl = document.getElementById("emptyState");
const searchInput = document.getElementById("searchInput");
const searchResultsEl = document.getElementById("searchResults");
const marketBadgeEl = document.getElementById("marketBadge");
const marketBadgeTextEl = document.getElementById("marketBadgeText");
const closedBannerEl = document.getElementById("closedBanner");

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(watchlist));
}

// ---------- 장중/장마감 판단 (KST 기준) ----------
function getKST() {
  return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" }));
}

function formatNextOpen(now) {
  const d = new Date(now);
  const beforeOpenToday = d.getDay() >= 1 && d.getDay() <= 5 && (d.getHours() < 9);
  if (!beforeOpenToday) {
    do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
  }
  const days = ["일", "월", "화", "수", "목", "금", "토"];
  return `${d.getMonth() + 1}/${d.getDate()}(${days[d.getDay()]}) 09:00`;
}

function updateMarketStatus() {
  const now = getKST();
  const day = now.getDay();
  const minutes = now.getHours() * 60 + now.getMinutes();
  const isWeekday = day >= 1 && day <= 5;
  const isOpen = isWeekday && minutes >= 9 * 60 && minutes < 15 * 60 + 30;

  marketBadgeEl.classList.toggle("open", isOpen);
  marketBadgeEl.classList.toggle("closed", !isOpen);
  marketBadgeTextEl.textContent = isOpen ? "장중 · 15:30 마감" : "장 마감";
  closedBannerEl.classList.toggle("show", !isOpen);
  if (!isOpen) {
    closedBannerEl.querySelector("span:last-child").innerHTML =
      `<b>장 마감</b> · 다음 개장 <b>${formatNextOpen(now)}</b>`;
  }
  return isOpen;
}

// ---------- 렌더링 ----------
function renderSkeleton() {
  if (watchlist.length === 0) {
    emptyEl.style.display = "block";
    listEl.innerHTML = "";
    return;
  }
  emptyEl.style.display = "none";
  listEl.innerHTML = watchlist.map(item => `
    <div class="card" id="card-${item.code}">
      <div class="left">
        <div class="name">${item.name}</div>
        <div class="code">${item.code} · ${item.market || ""}</div>
      </div>
      <div class="spark-wrap" id="spark-${item.code}"><span class="flat-hint">-</span></div>
      <div class="right">
        <div class="price" id="price-${item.code}">-</div>
        <div class="change flat" id="change-${item.code}">-</div>
      </div>
      <button class="remove-btn" onclick="removeStock('${item.code}')">×</button>
    </div>
  `).join("");
}

let lastSearchResults = []; // 현재 검색 결과 목록 (추가 상태 갱신용)

function renderSearchResults() {
  if (!Array.isArray(lastSearchResults) || lastSearchResults.length === 0) {
    searchResultsEl.innerHTML = `<div class="search-item"><span class="nm">검색 결과 없음</span></div>`;
    return;
  }
  searchResultsEl.innerHTML = lastSearchResults.map(d => {
    const added = watchlist.some(w => w.code === d.code);
    return `
      <div class="search-item ${added ? "added" : ""}" ${added ? "" : `onclick='event.stopPropagation(); addStock(${JSON.stringify(d)})'`}>
        <span class="nm">${d.name}</span>
        <span class="right-meta">
          <span class="mk">${d.market || ""} · ${d.code}</span>
          <span class="add-flag">${added ? "✓ 추가됨" : "+ 추가"}</span>
        </span>
      </div>
    `;
  }).join("");
}

function removeStock(code) {
  watchlist = watchlist.filter(w => w.code !== code);
  delete priceHistory[code];
  save();
  renderSkeleton();
  fetchQuotes();
  renderSearchResults(); // 검색 목록 열려있으면 '추가됨' 상태도 갱신
}

function addStock(item) {
  if (watchlist.some(w => w.code === item.code)) return;
  watchlist.push(item);
  save();
  renderSkeleton();
  fetchQuotes();
  renderSearchResults(); // 검색창은 안 닫고, 방금 추가한 항목만 '추가됨'으로 갱신
}

let searchDebounce = null;
searchInput.addEventListener("input", () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();
  if (!q) { searchResultsEl.classList.remove("show"); return; }
  searchDebounce = setTimeout(() => doSearch(q), 300);
});

async function doSearch(q) {
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    lastSearchResults = Array.isArray(data) ? data : [];
    renderSearchResults();
    searchResultsEl.classList.add("show");
  } catch (e) {
    console.error("search failed", e);
  }
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-box")) {
    searchResultsEl.classList.remove("show");
  }
});

function fmtNum(n) {
  if (n === null || n === undefined) return "-";
  return Number(n).toLocaleString("ko-KR");
}

// ---------- 스파크라인 ----------
function renderSpark(code, dir) {
  const wrap = document.getElementById(`spark-${code}`);
  if (!wrap) return;
  const hist = priceHistory[code] || [];

  if (hist.length < 2) {
    wrap.innerHTML = `<span class="flat-hint">${hist.length === 0 ? "-" : "···"}</span>`;
    return;
  }

  const w = 56, h = 26, pad = 3;
  const min = Math.min(...hist), max = Math.max(...hist);
  const range = (max - min) || 1;
  const step = (w - pad * 2) / (hist.length - 1);
  const points = hist.map((p, i) => {
    const x = pad + i * step;
    const y = pad + (1 - (p - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");

  const color = dir === "up" ? "var(--up)" : dir === "down" ? "var(--down)" : "var(--text-faint)";
  wrap.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round" />
    </svg>`;
}

// ---------- 시세 폴링 ----------
async function fetchQuotes() {
  if (watchlist.length === 0) return;
  const codes = watchlist.map(w => w.code).join(",");
  try {
    const res = await fetch(`/api/quotes?codes=${codes}`);
    const data = await res.json();
    if (!Array.isArray(data)) return;

    data.forEach(q => {
      const priceEl = document.getElementById(`price-${q.code}`);
      const changeEl = document.getElementById(`change-${q.code}`);
      const cardEl = document.getElementById(`card-${q.code}`);
      if (!priceEl || !changeEl) return;

      if (q.price === null || q.price === undefined) return; // 아직 데이터 없음 (장마감 등)

      const prev = lastPrices[q.code];
      priceEl.textContent = fmtNum(q.price);

      const dir = q.change > 0 ? "up" : q.change < 0 ? "down" : "flat";
      const arrow = q.change > 0 ? "▲" : q.change < 0 ? "▼" : "－";
      changeEl.className = `change ${dir}`;
      changeEl.innerHTML = `<span class="arrow">${arrow}</span> ${fmtNum(Math.abs(q.change))} (${q.rate > 0 ? "+" : ""}${q.rate}%)`;

      if (cardEl) {
        cardEl.classList.remove("dir-up", "dir-down");
        if (dir !== "flat") cardEl.classList.add(`dir-${dir}`);
      }

      if (cardEl && prev !== undefined && prev !== q.price) {
        cardEl.classList.remove("flash-up", "flash-down");
        void cardEl.offsetWidth;
        cardEl.classList.add(q.price > prev ? "flash-up" : "flash-down");
      }
      lastPrices[q.code] = q.price;

      if (!priceHistory[q.code]) priceHistory[q.code] = [];
      const h = priceHistory[q.code];
      if (h[h.length - 1] !== q.price) {
        h.push(q.price);
        if (h.length > MAX_HISTORY) h.shift();
      }
      renderSpark(q.code, dir === "flat" ? (h.length > 1 && h[h.length-1] > h[0] ? "up" : h.length > 1 && h[h.length-1] < h[0] ? "down" : "flat") : dir);
    });
  } catch (e) {
    console.error("quote fetch failed", e);
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  fetchQuotes();
  pollTimer = setInterval(fetchQuotes, 2000);
}

updateMarketStatus();
setInterval(updateMarketStatus, 30000);
renderSkeleton();
startPolling();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch((e) => console.error("SW 등록 실패", e));
  });
}
</script>

</body>
</html>
